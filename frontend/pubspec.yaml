name: pda
description: protein deficients anonymous — vegan collective liberation community
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.0.0
  dio: ^5.9.1
  flutter_secure_storage: ^10.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  logging: ^1.3.0
  intl: ^0.20.0
  cupertino_icons: ^1.0.8
  flutter_web_plugins:
    sdk: flutter
  url_launcher: ^6.3.2
  web: ^1.1.0
  share_plus: ^12.0.0
  image_picker: ^1.2.1
  crop_your_image: ^1.1.0
  flutter_quill: ^11.5.0
  mcp_toolkit: ^0.4.0
  shared_preferences: ^2.3.0
  flutter_widget_from_html_core: ^0.17.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^3.1.0
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
          weight: 400
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
