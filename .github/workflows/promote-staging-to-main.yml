name: Promote staging → main

on:
  workflow_dispatch: # manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check if staging is ahead of main
        id: check
        run: |
          git fetch origin main staging
          AHEAD=$(git rev-list origin/main..origin/staging --count)
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "Staging is $AHEAD commit(s) ahead of main"

      - name: Create PR and auto-merge
        if: steps.check.outputs.ahead != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head staging \
            --title "chore: promote staging → main" \
            --body "Automated promotion of staging to main." \
            2>/dev/null || gh pr list --base main --head staging --json url --jq '.[0].url')
          echo "PR: $PR_URL"
          gh pr merge "$PR_URL" --merge --auto --delete-branch=false

      - name: Nothing to promote
        if: steps.check.outputs.ahead == '0'
        run: echo "staging is up to date with main — nothing to promote"
