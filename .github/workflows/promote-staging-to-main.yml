name: Promote staging → main

on:
  workflow_dispatch: # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check if staging is ahead of main
        id: check
        run: |
          git fetch origin main staging
          AHEAD=$(git rev-list origin/main..origin/staging --count)
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "Staging is $AHEAD commit(s) ahead of main"

      - name: Merge staging into main
        if: steps.check.outputs.ahead != '0'
        run: |
          git checkout main
          git merge origin/staging --no-ff -m "chore: promote staging → main"
          git push origin main

      - name: Nothing to promote
        if: steps.check.outputs.ahead == '0'
        run: echo "staging is up to date with main — nothing to promote"
