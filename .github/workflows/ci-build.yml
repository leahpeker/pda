name: CI & Build

on:
  push:
    branches: [main, staging]

permissions:
  contents: read
  packages: write

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .

      - name: Django checks
        run: uv run python manage.py check

      - name: Tests
        run: uv run python -m pytest tests/ -q

      - name: Type check
        run: uv run ty check .

      - name: Complexity
        run: uvx --with flake8-cognitive-complexity flake8 --max-cognitive-complexity 10 --select CCR001 .

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib/ test/

      - name: Analyze
        run: dart analyze

      - name: Tests
        run: flutter test

      - name: Cache pub global packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-global-${{ runner.os }}-dart-code-metrics

      - name: Complexity
        run: dart pub global activate dart_code_metrics 2>/dev/null; dart pub global run dart_code_metrics:metrics analyze lib/ --disable-sunset-warning --set-exit-on-violation-level=warning

  build-and-push:
    name: Build & Push Image
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
